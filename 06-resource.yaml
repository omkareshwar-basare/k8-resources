apiVersion: v1
kind: Pod
metadata:
  name: resource-demo
  namespace: roboshop
spec:
  containers:
  - name: nginx
    image: nginx
    ports:
    - containerPort: 80
  resources:
  #soft limit
    requests:
      memory: "64Mi"
      cpu: "100m"
  #hard limit
    limits: 
      memory: "128Mi"
      cpu: "150m"