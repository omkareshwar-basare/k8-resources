apiVersion: v1
kind: Pod
metadata:
  name: emptydir-demo 
spec:
  containers:
  - name: nginx
    image: nginx
    volumeMounts:
    - name: nginx-log
      mountPath: /var/log/nginx
  - name: almalinux
    image: almalinux:9
    command: ["sleep", "3600"]
    volumeMounts:
    - name: nginx-log
      mountPath: /mnt/nginx-log
  volumes:
  - name: nginx-log
    emptyDir: 
      sizeLimit: 500mi